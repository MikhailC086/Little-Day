<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Test Pilot</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 10px;
            background-color: #0b0e14;
            color: #79c0ff;
            font-family: 'Consolas', monospace, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        .title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #58a6ff;
            margin-bottom: 8px;
            text-align: center;
            text-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
        }
        .mode-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            width: 100%;
            max-width: 320px;
        }
        .mode-btn {
            flex: 1;
            background: #161b22;
            border: 2px solid #30363d;
            color: #8b949e;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        .mode-btn.active {
            border-color: #58a6ff;
            color: #58a6ff;
            background: rgba(88, 166, 255, 0.1);
        }
        .score-board {
            font-size: 1.8rem;
            font-weight: bold;
            color: #3fb950;
            margin-bottom: 6px;
        }
        canvas {
            background-color: #161b22;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            cursor: pointer;
        }
        .hint {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #8b949e;
            text-align: center;
            max-width: 310px;
            min-height: 36px;
        }
    </style>
</head>
<body>

    <div class="title">🚀 PHYSICS TEST PILOT</div>

    <div class="mode-container">
        <button id="btnJetpack" class="mode-btn active" onclick="setMode('jetpack')">1. Space Jetpack (Flappy)</button>
        <button id="btnCatapult" class="mode-btn" onclick="setMode('catapult')">2. Wrecking Frog (Angry)</button>
    </div>

    <div class="score-board" id="score">0</div>

    <canvas id="gameCanvas" width="320" height="380"></canvas>

    <div class="hint" id="gameHint">TAP to fire thrusters! Feel the nose-dip physics & gravity.</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const hintEl = document.getElementById('gameHint');

    let currentMode = 'jetpack';
    let score = 0;
    let isGameOver = true;
    let isTouching = false;
    let animId = null;

    let bgOffset = 0;
    let particles = [];
    let state = {};

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btnJetpack').classList.toggle('active', mode === 'jetpack');
        document.getElementById('btnCatapult').classList.toggle('active', mode === 'catapult');

        if (mode === 'jetpack') {
            hintEl.textContent = "TAP to blast thrusters! Watch character tilt nose-down when falling.";
        } else {
            hintEl.textContent = "TAP to release vine swing! Launch like a ball & smash stacked towers.";
        }
        resetGame();
    }

    function createExplosion(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                radius: Math.random() * 4 + 2,
                color: color,
                life: 1.0
            });
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.04;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawParticles() {
        for (let p of particles) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1.0;
    }

    function resetGame() {
        score = 0;
        scoreEl.textContent = score;
        isGameOver = false;
        isTouching = false;
        particles = [];

        if (animId) cancelAnimationFrame(animId);

        if (currentMode === 'jetpack') {
            state = {
                x: 80, y: 190,
                vy: 0, rotation: 0,
                pipes: [], timer: 0
            };
        } else {
            state = {
                x: 60, y: 220,
                vx: 0, vy: 0,
                attached: true,
                anchor: { x: 100, y: 60 },
                angle: 0, swingSpeed: 0.05,
                blocks: []
            };
            // Build stacked tower
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 2; c++) {
                    state.blocks.push({
                        x: 230 + c * 25,
                        y: 280 - r * 30,
                        w: 22, h: 28,
                        vx: 0, vy: 0,
                        color: r % 2 === 0 ? '#d2a8ff' : '#e34c26',
                        broken: false
                    });
                }
            }
        }

        animate();
    }

    function update() {
        if (isGameOver) return;
        updateParticles();
        bgOffset = (bgOffset + 1.5) % 40;

        // ----------------------------------------------------
        // 1. SPACE JETPACK (Flappy-style)
        // ----------------------------------------------------
        if (currentMode === 'jetpack') {
            state.vy += 0.45; // Heavy gravity
            state.y += state.vy;

            // Character rotation (tilt up when rising, nose-dive when falling)
            state.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 6, state.vy * 0.08));

            // Pipe Spawning
            state.timer++;
            if (state.timer % 70 === 0) {
                let gapY = Math.random() * 160 + 80;
                state.pipes.push({ x: canvas.width, gapY: gapY, gapH: 100, scored: false });
            }

            // Pipe Movement & Collision
            for (let i = state.pipes.length - 1; i >= 0; i--) {
                let p = state.pipes[i];
                p.x -= 2.5;

                // Check collision with top/bottom pipes
                if (Math.abs(p.x - state.x) < 25) {
                    if (state.y - 12 < p.gapY - p.gapH / 2 || state.y + 12 > p.gapY + p.gapH / 2) {
                        createExplosion(state.x, state.y, '#f85149', 15);
                        isGameOver = true;
                    } else if (!p.scored) {
                        p.scored = true;
                        score++;
                        scoreEl.textContent = score;
                    }
                }

                if (p.x < -40) state.pipes.splice(i, 1);
            }

            // Ground/Ceiling check
            if (state.y < 10 || state.y > canvas.height - 20) {
                createExplosion(state.x, state.y, '#f85149', 15);
                isGameOver = true;
            }
        }

        // ----------------------------------------------------
        // 2. WRECKING FROG (Angry Birds Smash-style)
        // ----------------------------------------------------
        else {
            if (state.attached) {
                state.angle += state.swingSpeed;
                state.x = state.anchor.x + Math.sin(state.angle) * 110;
                state.y = state.anchor.y + Math.cos(state.angle) * 110;
            } else {
                // Free Flight trajectory
                state.vy += 0.25; // Gravity arc
                state.x += state.vx;
                state.y += state.vy;

                // Block collisions
                for (let b of state.blocks) {
                    if (!b.broken && Math.abs(state.x - b.x) < 20 && Math.abs(state.y - b.y) < 20) {
                        b.broken = true;
                        b.vx = state.vx * 0.8;
                        b.vy = state.vy * 0.5 - 2;
                        createExplosion(b.x, b.y, b.color, 8);
                        score++;
                        scoreEl.textContent = score;
                    }
                }
            }

            // Update flying block fragments
            for (let b of state.blocks) {
                if (b.broken) {
                    b.vy += 0.3;
                    b.x += b.vx;
                    b.y += b.vy;
                }
            }

            if (state.x > canvas.width + 30 || state.y > canvas.height - 10) {
                isGameOver = true;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Scrolling Parallax Background Lines
        ctx.strokeStyle = '#21262d';
        ctx.lineWidth = 1;
        for (let x = -bgOffset; x < canvas.width; x += 40) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }

        drawParticles();

        // 1. SPACE JETPACK
        if (currentMode === 'jetpack') {
            // Draw Pipes
            for (let p of state.pipes) {
                ctx.fillStyle = '#30363d';
                ctx.strokeStyle = '#58a6ff';
                ctx.lineWidth = 2;

                // Top Pipe
                ctx.fillRect(p.x - 20, 0, 40, p.gapY - p.gapH / 2);
                ctx.strokeRect(p.x - 20, 0, 40, p.gapY - p.gapH / 2);

                // Bottom Pipe
                ctx.fillRect(p.x - 20, p.gapY + p.gapH / 2, 40, canvas.height);
                ctx.strokeRect(p.x - 20, p.gapY + p.gapH / 2, 40, canvas.height);
            }

            // Draw Jetpack Character
            ctx.save();
            ctx.translate(state.x, state.y);
            ctx.rotate(state.rotation);

            // Jetpack Flame
            if (isTouching) {
                ctx.fillStyle = '#e34c26';
                ctx.beginPath();
                ctx.moveTo(-16, 0); ctx.lineTo(-28, 4); ctx.lineTo(-16, 8);
                ctx.fill();
            }

            // Body
            ctx.fillStyle = '#58a6ff';
            ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();

            // Visor / Eye
            ctx.fillStyle = '#fff';
            ctx.fillRect(4, -5, 7, 7);

            ctx.restore();
        }

        // 2. WRECKING FROG
        else {
            // Vine / Tether
            if (state.attached) {
                ctx.strokeStyle = '#3fb950';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(state.anchor.x, state.anchor.y);
                ctx.lineTo(state.x, state.y);
                ctx.stroke();
            }

            // Draw Stacked Target Blocks
            for (let b of state.blocks) {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
            }

            // Frog / Ball Character
            ctx.fillStyle = '#3fb950';
            ctx.shadowColor = '#3fb950';
            ctx.shadowBlur = state.attached ? 0 : 10;
            ctx.beginPath();
            ctx.arc(state.x, state.y, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Ground Line
        ctx.fillStyle = '#30363d';
        ctx.fillRect(0, canvas.height - 15, canvas.width, 15);

        // Overlay text
        if (isGameOver) {
            ctx.fillStyle = 'rgba(11, 14, 20, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#58a6ff';
            ctx.font = 'bold 18px Consolas, monospace';
            ctx.textAlign = 'center';
            ctx.fillText(score > 0 ? 'GAME OVER' : 'TAP TO START', canvas.width / 2, canvas.height / 2);
            ctx.font = '12px Consolas, monospace';
            ctx.fillStyle = '#8b949e';
            ctx.fillText('Tap screen to play', canvas.width / 2, canvas.height / 2 + 25);
        }
    }

    function animate() {
        update();
        draw();
        if (!isGameOver) {
            animId = requestAnimationFrame(animate);
        }
    }

    function handleStart(e) {
        e.preventDefault();
        if (isGameOver) {
            resetGame();
            return;
        }

        isTouching = true;

        if (currentMode === 'jetpack') {
            state.vy = -7.5; // Upward jetpack burst
            createExplosion(state.x - 14, state.y, '#e34c26', 4);
        } else if (currentMode === 'catapult' && state.attached) {
            // Launch frog off vine with current momentum
            state.attached = false;
            let speed = 9;
            state.vx = Math.cos(state.angle) * speed;
            state.vy = -Math.sin(state.angle) * speed;
        }
    }

    function handleEnd(e) {
        e.preventDefault();
        isTouching = false;
    }

    canvas.addEventListener('pointerdown', handleStart);
    canvas.addEventListener('pointerup', handleEnd);
    canvas.addEventListener('mouseleave', handleEnd);

    setMode('jetpack');
</script>
</body>
</html>
